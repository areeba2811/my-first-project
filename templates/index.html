<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Text Auto-Completion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            text-align: center;
        }
        p {
            text-align: center;
            color: #666;
        }
        textarea {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: monospace;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .suggestions {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .suggestion-title {
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 10px;
        }
        .suggestion-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .suggestion-list button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .suggestion-list button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ AI Text Auto-Completion</h1>
    <p>Type karo - AI next word suggest karega</p>
    
    <textarea id="textInput" rows="5" placeholder="Example: how are you"></textarea>
    
    <div class="suggestions">
        <div class="suggestion-title">💡 Suggested Words:</div>
        <div id="suggestionList" class="suggestion-list">
            <span>Type karo predictions dekho...</span>
        </div>
    </div>
</div>

<script>
    let typingTimer;
    const textarea = document.getElementById('textInput');
    
    textarea.addEventListener('input', function() {
        clearTimeout(typingTimer);
        typingTimer = setTimeout(function() {
            const text = textarea.value;
            if (text.trim() !== '') {
                fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({text: text})
                })
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    const suggestionDiv = document.getElementById('suggestionList');
                    if (data.suggestions && data.suggestions.length > 0) {
                        let html = '';
                        for (let i = 0; i < data.suggestions.length; i++) {
                            html += '<button onclick="insertWord(\'' + data.suggestions[i] + '\')">' + data.suggestions[i] + '</button>';
                        }
                        suggestionDiv.innerHTML = html;
                    } else {
                        suggestionDiv.innerHTML = '<span>No suggestions</span>';
                    }
                });
            }
        }, 400);
    });
    
    function insertWord(word) {
        textarea.value = textarea.value + ' ' + word + ' ';
        textarea.focus();
        const event = new Event('input');
        textarea.dispatchEvent(event);
    }
</script>
</body>
</html>
